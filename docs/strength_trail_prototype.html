<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strength Trail — Prototype</title>
<style>
:root {
  --bg:      #0d0d14;
  --card:    #13131f;
  --card2:   #1a1a28;
  --border:  rgba(255,255,255,0.07);
  --text:    #e8e8f2;
  --dim:     rgba(232,232,242,0.45);
  --faint:   rgba(232,232,242,0.22);

  --tier-dev:   rgba(107,114,128,0.18);
  --tier-int:   rgba(59,130,246,0.16);
  --tier-adv:   rgba(129,140,248,0.16);
  --tier-elite: rgba(167,139,250,0.16);

  --c-bench:    #f87171;
  --c-squat:    #60a5fa;
  --c-dead:     #4ade80;
  --c-ohp:      #fbbf24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding: 28px 24px;
}

h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.subtitle { font-size: 12px; color: var(--dim); margin-top: 3px; margin-bottom: 22px; }

/* Tabs */
.tabs {
  display: flex; gap: 3px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 3px; width: fit-content; margin-bottom: 18px;
}
.tab {
  padding: 7px 15px; border-radius: 9px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; background: transparent; color: var(--dim);
  transition: all 0.18s;
}
.tab.active  { background: rgba(139,92,246,0.22); color: var(--text); }
.tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text); }

/* Card */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  position: relative;
}

/* Panel */
.panel { display: none; }
.panel.active { display: block; }

/* Canvas */
canvas { display: block; cursor: crosshair; max-width: 100%; }

/* Legend */
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
.ldot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.lline { width: 18px; height: 2px; border-radius: 1px; flex-shrink: 0; }

/* Tooltip */
#tooltip {
  position: fixed; z-index: 200;
  background: rgba(18,18,30,0.96); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 10px; padding: 10px 14px; font-size: 11px;
  pointer-events: none; display: none;
  backdrop-filter: blur(10px);
  min-width: 140px;
}
#tooltip .t-label { color: var(--dim); font-size: 10px; }
#tooltip .t-val   { font-weight: 600; font-size: 14px; margin-top: 1px; }
#tooltip .t-tier  { font-size: 10px; margin-top: 5px; font-weight: 600; }

/* Back button (absolute over portfolio canvas) */
.back-btn {
  position: absolute; top: 14px; left: 16px; z-index: 10;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; color: var(--text); font-size: 11px; font-weight: 600;
  padding: 5px 11px; cursor: pointer;
  display: none;
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }

/* 3D hint */
.hint-3d {
  font-size: 10px; color: var(--faint); margin-top: 6px; text-align: center;
}
</style>
</head>
<body>

<h1>Strength Trail</h1>
<p class="subtitle">Visual prototype — 3 approaches. Data: 68 kg lifter, 6-month window.</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">Portfolio</button>
  <button class="tab"        onclick="switchTab(1)">All Lifts</button>
  <button class="tab"        onclick="switchTab(2)">3D Trail</button>
</div>

<!-- ── PANEL 0: Portfolio quadrant — tap bubble to reveal trail in place ── -->
<div class="panel active" id="panel0">
  <div class="card" id="portfolioCard">
    <button class="back-btn" id="portfolioBack" onclick="closeTrail()">← All lifts</button>
    <canvas id="cvPortfolio"></canvas>
    <div class="legend" id="legPortfolio"></div>
  </div>
</div>

<!-- ── PANEL 1: All lifts constellation ── -->
<div class="panel" id="panel1">
  <div class="card">
    <canvas id="cvAll"></canvas>
    <div class="legend" id="legAll"></div>
  </div>
</div>

<!-- ── PANEL 2: 3D trail ── -->
<div class="panel" id="panel2">
  <div class="card">
    <canvas id="cv3d"></canvas>
    <p class="hint-3d">Drag to rotate · X = e1RM (kg) · Y = BW ratio · Z = time →</p>
    <div class="legend" id="leg3d"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────

const liftData = {

      { date:'2024-12-20', e1rm:84,  bw:68.0, vol:6300 },

      { date:'2025-01-03', e1rm:40,  bw:68.2, vol:2400 },
      { date:'2025-01-17', e1rm:41,  bw:68.5, vol:2500 },
      { date:'2025-01-31', e1rm:43,  bw:68.5, vol:2650 },
      { date:'2025-02-14', e1rm:43,  bw:68.2, vol:2400 },
      { date:'2025-02-28', e1rm:44,  bw:68.5, vol:2700 },
      { date:'2025-03-14', e1rm:46,  bw:68.8, vol:2850 },
      { date:'2025-03-28', e1rm:48,  bw:69.0, vol:2950 },
      { date:'2025-04-11', e1rm:49,  bw:69.0, vol:3000 },
      { date:'2025-04-25', e1rm:51,  bw:69.3, vol:3100 },
      { date:'2025-05-09', e1rm:52,  bw:69.5, vol:3200 },
    ]
  }

Object.values(liftData).forEach(lift => {
  lift.sessions = lift.sessions.map(s => ({
    ...s,
    ratio: +(s.e1rm / s.bw).toFixed(3),
    dateObj: new Date(s.date)
  }));
});

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────

const PAD = { top: 30, right: 24, bottom: 44, left: 52 };

function hex2rgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function lerp(a, b, t) { return a + (b - a) * t; }

function getTierLabel(ratio, t) {
  if (ratio < t.di)  return { name: 'Developing',   color: '#9ca3af' };
  if (ratio < t.ia)  return { name: 'Intermediate', color: '#60a5fa' };
  if (ratio < t.ae)  return { name: 'Advanced',     color: '#818cf8' };
  return                    { name: 'Elite',         color: '#a78bfa' };
}

function gainRatePct(sessions) {
  const pts = sessions.slice(-8);
  if (pts.length < 3) return 0;
  const t0 = pts[0].dateObj.getTime();
  const xs = pts.map(p => (p.dateObj.getTime() - t0) / 604800000);
  const ys = pts.map(p => p.e1rm);
  const n = xs.length;
  const sx = xs.reduce((a,v)=>a+v,0), sy = ys.reduce((a,v)=>a+v,0);
  const sxy = xs.reduce((a,v,i)=>a+v*ys[i],0), sx2 = xs.reduce((a,v)=>a+v*v,0);
  const slope = (n*sxy - sx*sy) / (n*sx2 - sx*sx);
  const mean = sy / n;
  return mean > 0 ? +(slope / mean * 100).toFixed(2) : 0;
}

function mapX(v, min, max, w)  { return PAD.left + (v-min)/(max-min)*w; }
function mapY(v, min, max, h)  { return PAD.top  + h - (v-min)/(max-min)*h; }
function dw(cv) { return cv.width  - PAD.left - PAD.right; }
function dh(cv) { return cv.height - PAD.top  - PAD.bottom; }

function sizeCanvas(cv) {
  const W = cv.parentElement.clientWidth - 40;
  cv.width  = W;
  cv.height = Math.round(W * 0.52);
}

function drawGrid(ctx, cv, xMin, xMax, yMin, yMax, xStep, yStep, yFmt) {
  const w = dw(cv), h = dh(cv);
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.font = '10px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(232,232,242,0.35)';
  ctx.textAlign = 'right';
  for (let v = Math.ceil(yMin/yStep)*yStep; v <= yMax + 0.001; v += yStep) {
    const y = mapY(v, yMin, yMax, h);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left+w, y); ctx.stroke();
    ctx.fillText(yFmt(v), PAD.left-5, y+3.5);
  }
  ctx.textAlign = 'center';
  for (let v = Math.ceil(xMin/xStep)*xStep; v <= xMax + 0.001; v += xStep) {
    const x = mapX(v, xMin, xMax, w);
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top+h); ctx.stroke();
    ctx.fillText(v + 'kg', x, PAD.top+h+14);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.09)';
  ctx.strokeRect(PAD.left, PAD.top, w, h);
  ctx.restore();
}

function axisLabels(ctx, cv, xLabel, yLabel) {
  const w = dw(cv), h = dh(cv);
  ctx.save();
  ctx.fillStyle = 'rgba(232,232,242,0.5)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(xLabel, PAD.left + w/2, cv.height - 4);
  ctx.save();
  ctx.translate(12, PAD.top + h/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();
  ctx.restore();
}

// ─────────────────────────────────────────────
//  PORTFOLIO STATE
// ─────────────────────────────────────────────

let selectedLift = null;  // key string or null

function openTrail(key) {
  selectedLift = key;
  document.getElementById('portfolioBack').style.display = 'block';
  document.getElementById('tooltip').style.display = 'none';
  drawPortfolio();
}

function closeTrail() {
  selectedLift = null;
  document.getElementById('portfolioBack').style.display = 'none';
  document.getElementById('tooltip').style.display = 'none';
  drawPortfolio();
}

// ─────────────────────────────────────────────
//  PORTFOLIO — shared scale, quadrant + in-place trail
// ─────────────────────────────────────────────

// Compute historical (e1rm, gainRate) for each session of a lift,
// on the same axes as the portfolio quadrant.
function portfolioHistory(liftKey) {
  const sessions = liftData[liftKey].sessions;
  return sessions.map((s, i) => ({
    e1rm: s.e1rm,
    rate: gainRatePct(sessions.slice(0, i + 1)),
    vol:  s.vol,
    date: s.date,
  }));
}

function drawPortfolio() {
  const cv = document.getElementById('cvPortfolio');
  sizeCanvas(cv);
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  const w = dw(cv), h = dh(cv);

  // Current summary for all lifts — used for scale AND bubble positions
  const lifts = Object.entries(liftData).map(([key, data]) => {
    const last = data.sessions[data.sessions.length - 1];
    const rate = gainRatePct(data.sessions);
    const tier = getTierLabel(last.ratio, data.tiers);
    const freq = data.sessions.length;
    return { key, label: data.label, color: data.color, e1rm: last.e1rm, rate, tier, freq, ratio: last.ratio };
  });

  // Scale is ALWAYS derived from all lifts — same in both modes so bubbles don't move
  const allX = lifts.map(l => l.e1rm);
  const allY = lifts.map(l => l.rate);
  const xMin = Math.floor(Math.min(...allX) * 0.78), xMax = Math.ceil(Math.max(...allX) * 1.18);
  const yPad = Math.max(...allY.map(Math.abs)) * 1.55;
  const yMin = -yPad, yMax = yPad;
  const maxFreq = Math.max(...lifts.map(l => l.freq));

  // Quadrant backgrounds (always drawn, dimmed in trail mode)
  const midX = mapX((xMin+xMax)/2, xMin, xMax, w);
  const midY = mapY(0, yMin, yMax, h);
  const quadAlpha = selectedLift ? 0.3 : 1;

  ctx.globalAlpha = quadAlpha;
  const quads = [
    { x: midX,    y: PAD.top, W: PAD.left+w-midX,  H: midY-PAD.top,   col: 'rgba(74,222,128,0.06)',  label: 'Strong & growing', ax: 0.75, ay: 0.15 },
    { x: PAD.left, y: PAD.top, W: midX-PAD.left,   H: midY-PAD.top,   col: 'rgba(59,130,246,0.06)',  label: 'Rising fast',      ax: 0.25, ay: 0.15 },
    { x: midX,    y: midY,    W: PAD.left+w-midX,  H: PAD.top+h-midY, col: 'rgba(251,191,36,0.06)',  label: 'Peaked / plateau', ax: 0.75, ay: 0.85 },
    { x: PAD.left, y: midY,   W: midX-PAD.left,    H: PAD.top+h-midY, col: 'rgba(239,68,68,0.06)',   label: 'Stagnant',         ax: 0.25, ay: 0.85 },
  ];
  quads.forEach(q => {
    ctx.fillStyle = q.col; ctx.fillRect(q.x, q.y, q.W, q.H);
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(q.label, PAD.left + q.ax*w, PAD.top + q.ay*h);
  });
  ctx.globalAlpha = 1;

  ctx.beginPath(); ctx.setLineDash([3,4]);
  ctx.strokeStyle = `rgba(255,255,255,${selectedLift ? 0.04 : 0.12})`; ctx.lineWidth = 1;
  ctx.moveTo(PAD.left, midY); ctx.lineTo(PAD.left+w, midY); ctx.stroke();
  ctx.beginPath();
  ctx.strokeStyle = `rgba(255,255,255,${selectedLift ? 0.03 : 0.07})`;
  ctx.moveTo(midX, PAD.top); ctx.lineTo(midX, PAD.top+h); ctx.stroke();
  ctx.setLineDash([]);

  if (selectedLift) {
    // ── Trail mode: ghost other lifts, draw comet tail on same axes ──
    const history = portfolioHistory(selectedLift);
    const lift    = liftData[selectedLift];
    const rgb     = hex2rgb(lift.color);
    const n       = history.length;
    const currentR = 18 + (lifts.find(l => l.key === selectedLift).freq / maxFreq) * 20;

    // Screen coords for each session
    const pts = history.map((p, i) => ({
      x: mapX(p.e1rm, xMin, xMax, w),
      y: mapY(p.rate,  yMin, yMax, h),
      frac: i / (n - 1),
      date: p.date,
      e1rm: p.e1rm,
      rate: p.rate,
    }));

    // Ghost bubbles for other lifts
    lifts.filter(l => l.key !== selectedLift).forEach(l => {
      const x = mapX(l.e1rm, xMin, xMax, w);
      const y = mapY(l.rate, yMin, yMax, h);
      const r = 18 + (l.freq / maxFreq) * 20;
      const { r:cr, g:cg, b:cb } = hex2rgb(l.color);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.09)`; ctx.lineWidth = 1; ctx.stroke();
    });

    // Historical bubbles at their actual data positions, oldest → newest so newer sit on top.
    // Each step back: ×0.9 size, ×0.9 opacity (= 25% overlap at typical spacing).
    const { r:cr, g:cg, b:cb } = hex2rgb(lift.color);
    for (let i = 0; i < n - 1; i++) {
      const stepsBack = (n - 1) - i;
      const scale = Math.pow(0.9, stepsBack);
      const r = currentR * scale;
      const a = scale;
      const { x, y } = pts[i];
      const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},${(a * 0.38).toFixed(3)})`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},${(a * 0.18).toFixed(3)})`);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(a * 0.50).toFixed(3)})`;
      ctx.lineWidth = 1; ctx.stroke();
    }

    // Date label on oldest dot
    {
      const { x, y } = pts[0];
      ctx.fillStyle = 'rgba(232,232,242,0.22)'; ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(new Date(pts[0].date).toLocaleDateString('en-AU',{month:'short',year:'2-digit'}), x, y - 8);
    }

    // Pass 3: current bubble — full portfolio style, same position as before
    {
      const { x, y } = pts[n - 1];
      const { r:cr, g:cg, b:cb } = hex2rgb(lift.color);
      // outer glow
      ctx.beginPath(); ctx.arc(x, y, currentR + 12, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.07)`; ctx.fill();
      // radial fill
      const grad = ctx.createRadialGradient(x - currentR*0.3, y - currentR*0.3, currentR*0.1, x, y, currentR);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},0.42)`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},0.20)`);
      ctx.beginPath(); ctx.arc(x, y, currentR, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.80)`; ctx.lineWidth = 1.5; ctx.stroke();
      // labels
      ctx.fillStyle = lift.color; ctx.font = '700 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(lift.label.split(' ').slice(-1)[0], x, y - 4);
      ctx.fillStyle = 'rgba(232,232,242,0.7)'; ctx.font = '10px -apple-system, sans-serif';
      ctx.fillText(pts[n-1].e1rm + ' kg', x, y + 9);
      const sign = pts[n-1].rate >= 0 ? '+' : '';
      ctx.fillStyle = pts[n-1].rate >= 0.1 ? '#4ade80' : '#f87171';
      ctx.font = '600 10px -apple-system, sans-serif';
      ctx.fillText(`${sign}${pts[n-1].rate.toFixed(2)}%/wk`, x, y + currentR + 14);
    }

  } else {
    // ── Normal mode: all bubbles ──
    lifts.forEach(l => {
      const x = mapX(l.e1rm, xMin, xMax, w);
      const y = mapY(l.rate, yMin, yMax, h);
      const r = 18 + (l.freq / maxFreq) * 20;
      const { r:cr, g:cg, b:cb } = hex2rgb(l.color);

      ctx.beginPath(); ctx.arc(x, y, r+10, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.07)`; ctx.fill();

      const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},0.38)`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},0.18)`);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.75)`; ctx.lineWidth = 1.5; ctx.stroke();

      ctx.fillStyle = l.color; ctx.font = '700 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(l.label.split(' ').slice(-1)[0], x, y - 4);
      ctx.fillStyle = 'rgba(232,232,242,0.7)'; ctx.font = '10px -apple-system, sans-serif';
      ctx.fillText(l.e1rm + ' kg', x, y + 9);

      const sign = l.rate >= 0 ? '+' : '';
      ctx.fillStyle = l.rate >= 0.1 ? '#4ade80' : l.rate < -0.1 ? '#f87171' : 'rgba(232,232,242,0.5)';
      ctx.font = '600 10px -apple-system, sans-serif';
      ctx.fillText(`${sign}${l.rate}%/wk`, x, y + r + 14);
    });
  }

  drawGrid(ctx, cv, xMin, xMax, yMin, yMax, 10, 0.5, v => (v>0?'+':'')+v.toFixed(1)+'%');
  axisLabels(ctx, cv, 'e1RM (kg)', 'Gain Rate (% / week)');

  document.getElementById('legPortfolio').innerHTML = selectedLift
    ? `<div class="legend-item"><div class="ldot" style="background:${liftData[selectedLift].color};opacity:.3;width:6px;height:6px"></div><span>older</span><div class="ldot" style="background:${liftData[selectedLift].color};margin-left:6px"></div><span>current — tap background to go back</span></div>`
    : `<div class="legend-item"><div class="ldot" style="background:#fff;opacity:.3"></div><span>Bubble size = sessions</span></div>` +
      Object.values(liftData).map(d => `<div class="legend-item"><div class="ldot" style="background:${d.color}"></div><span>${d.label}</span></div>`).join('');

  setupPortfolioInteraction(cv, lifts, xMin, xMax, yMin, yMax, maxFreq);
}

function setupPortfolioInteraction(cv, lifts, xMin, xMax, yMin, yMax, maxFreq) {
  const tooltip = document.getElementById('tooltip');
  const w = dw(cv), h = dh(cv);

  function findHit(mx, my) {
    return lifts.find(l => {
      const x = mapX(l.e1rm, xMin, xMax, w);
      const y = mapY(l.rate, yMin, yMax, h);
      const r = 18 + (l.freq / maxFreq) * 20;
      return Math.hypot(mx - x, my - y) <= r + 4;
    }) || null;
  }

  cv.onmousemove = e => {
    const rect = cv.getBoundingClientRect();
    const hit = findHit(e.clientX - rect.left, e.clientY - rect.top);
    if (hit && !selectedLift) {
      cv.style.cursor = 'pointer';
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top  = (e.clientY - 8)  + 'px';
      tooltip.innerHTML = `
        <div class="t-label">${hit.label}</div>
        <div class="t-val">${hit.e1rm} kg e1RM</div>
        <div class="t-label" style="margin-top:4px">Gain rate</div>
        <div class="t-val" style="font-size:12px">${hit.rate > 0 ? '+' : ''}${hit.rate}% / week</div>
        <div class="t-tier" style="color:${hit.tier.color}">${hit.tier.name}</div>
        <div style="font-size:10px;color:rgba(232,232,242,0.35);margin-top:4px">Tap to see trail →</div>
      `;
    } else {
      cv.style.cursor = selectedLift ? 'default' : 'crosshair';
      tooltip.style.display = 'none';
    }
  };
  cv.onmouseleave = () => { tooltip.style.display = 'none'; };
  cv.onclick = e => {
    const rect = cv.getBoundingClientRect();
    const hit = findHit(e.clientX - rect.left, e.clientY - rect.top);
    if (selectedLift) {
      // In trail mode: clicking the active bubble deselects, clicking elsewhere deselects
      closeTrail();
    } else if (hit) {
      openTrail(hit.key);
    }
  };
}

// ─────────────────────────────────────────────
//  ALL LIFTS CONSTELLATION
// ─────────────────────────────────────────────

function drawAllLifts() {
  const cv = document.getElementById('cvAll');
  sizeCanvas(cv);
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  const w = dw(cv), h = dh(cv);

  const allE   = Object.values(liftData).flatMap(d => d.sessions.map(s => s.e1rm));
  const allR   = Object.values(liftData).flatMap(d => d.sessions.map(s => s.ratio));
  const xMin   = Math.floor(Math.min(...allE) * 0.88);
  const xMax   = Math.ceil( Math.max(...allE) * 1.06);
  const yMin   = Math.max(0, Math.min(...allR) * 0.85);
  const yMax   = Math.max(...allR) * 1.12;

  drawGrid(ctx, cv, xMin, xMax, yMin, yMax, 10, 0.25, v => v.toFixed(2)+'×');

  Object.entries(liftData).forEach(([key, lift]) => {
    const data = lift.sessions;
    const rgb  = hex2rgb(lift.color);

    for (let i = 1; i < data.length; i++) {
      const f1 = i/(data.length-1);
      const x0 = mapX(data[i-1].e1rm, xMin, xMax, w), y0 = mapY(data[i-1].ratio, yMin, yMax, h);
      const x1 = mapX(data[i  ].e1rm, xMin, xMax, w), y1 = mapY(data[i  ].ratio, yMin, yMax, h);
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${lerp(0.08,0.45,f1)})`;
      ctx.lineWidth   = lerp(0.8, 2, f1);
      ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    }

    data.forEach((p, i) => {
      const frac   = i / (data.length - 1);
      const isLast = i === data.length - 1;
      const x = mapX(p.e1rm, xMin, xMax, w);
      const y = mapY(p.ratio, yMin, yMax, h);
      const r = isLast ? 6 : lerp(2, 4, frac);

      if (isLast) {
        ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2);
        ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${lerp(0.15,1,frac)})`; ctx.fill();
    });

    const last = data[data.length-1];
    ctx.fillStyle  = lift.color;
    ctx.font       = '600 10px -apple-system, sans-serif';
    ctx.textAlign  = 'left';
    ctx.fillText(lift.label, mapX(last.e1rm, xMin, xMax, w)+9, mapY(last.ratio, yMin, yMax, h)+3.5);
  });

  axisLabels(ctx, cv, 'e1RM (kg)', 'Relative Strength (× BW)');

  document.getElementById('legAll').innerHTML =
    Object.values(liftData).map(d =>
      `<div class="legend-item">
        <div class="lline" style="background:${d.color}"></div>
        <div class="ldot" style="background:${d.color};opacity:0.3;margin-left:-4px"></div>
        <span>${d.label}</span>
       </div>`
    ).join('') +
    `<div class="legend-item" style="margin-left:8px">
       <div class="ldot" style="background:#888;opacity:0.3;width:6px;height:6px"></div>
       <span>older</span>
       <div class="ldot" style="background:#888;margin-left:4px"></div>
       <span>recent</span>
     </div>`;
}

// ─────────────────────────────────────────────
//  3D TRAIL
// ─────────────────────────────────────────────

let angle3dX = 0.36, angle3dY = -0.52, drag3d = false, lastMouse = null;

function project3d(x, y, z, cx, cy) {
  const cosY = Math.cos(angle3dY), sinY = Math.sin(angle3dY);
  const x1   =  x*cosY + z*sinY;
  const z1   = -x*sinY + z*cosY;
  const cosX = Math.cos(angle3dX), sinX = Math.sin(angle3dX);
  const y1   = y*cosX - z1*sinX;
  const z2   = y*sinX + z1*cosX;
  const fov  = 600;
  const s    = fov / (fov + z2 + 200);
  return { px: cx + x1*s, py: cy + y1*s, scale: s, depth: z2 };
}

function draw3D() {
  const cv  = document.getElementById('cv3d');
  sizeCanvas(cv);
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);

  const cx = cv.width/2, cy = cv.height/2 - 10;

  const allLifts3d = Object.entries(liftData).map(([key, lift]) => {
    const sessions = lift.sessions;
    const e1rms    = sessions.map(s => s.e1rm);
    const ratios   = sessions.map(s => s.ratio);
    const eMin = Math.min(...e1rms), eMax = Math.max(...e1rms);
    const rMin = Math.min(...ratios), rMax = Math.max(...ratios);
    const n    = sessions.length;
    const pts  = sessions.map((s, i) => ({
      x3: (s.e1rm  - eMin) / (eMax - eMin + 0.01) * 200 - 100,
      y3: (s.ratio - rMin) / (rMax - rMin + 0.01) * 150 - 75,
      z3: (i / (n - 1)) * 220 - 110,
      e1rm: s.e1rm, ratio: s.ratio, date: s.date,
      frac: i / (n-1), isLast: i === n-1,
    }));
    return { key, lift, pts };
  });

  const segments = [];
  allLifts3d.forEach(({ lift, pts }) => {
    for (let i = 0; i < pts.length; i++) {
      const p   = project3d(pts[i].x3, pts[i].y3, pts[i].z3, cx, cy);
      const rgb = hex2rgb(lift.color);
      segments.push({ type:'dot', px:p.px, py:p.py, depth:p.depth, scale:p.scale,
        frac:pts[i].frac, isLast:pts[i].isLast, color:lift.color, rgb, lift,
        e1rm:pts[i].e1rm, ratio:pts[i].ratio, date:pts[i].date });
    }
    for (let i = 1; i < pts.length; i++) {
      const p0 = project3d(pts[i-1].x3, pts[i-1].y3, pts[i-1].z3, cx, cy);
      const p1 = project3d(pts[i  ].x3, pts[i  ].y3, pts[i  ].z3, cx, cy);
      const f1 = pts[i].frac;
      const { r, g, b } = hex2rgb(lift.color);
      segments.push({ type:'line', x0:p0.px, y0:p0.py, x1:p1.px, y1:p1.py,
        depth:(p0.depth+p1.depth)/2, color:`rgba(${r},${g},${b},${lerp(0.1,0.55,f1)})`,
        width: lerp(1,2.4,f1) });
    }
  });

  segments.sort((a,b) => b.depth - a.depth);

  segments.forEach(seg => {
    if (seg.type === 'line') {
      ctx.beginPath(); ctx.strokeStyle = seg.color; ctx.lineWidth = seg.width;
      ctx.moveTo(seg.x0, seg.y0); ctx.lineTo(seg.x1, seg.y1); ctx.stroke();
    } else {
      const { rgb, frac, isLast, scale } = seg;
      const r = isLast ? 7*scale : lerp(2.5, 5, frac)*scale;
      const a = lerp(0.2, 1, frac);
      const rc = lerp(140,rgb.r,frac)|0, gc = lerp(140,rgb.g,frac)|0, bc = lerp(160,rgb.b,frac)|0;
      if (isLast) {
        ctx.beginPath(); ctx.arc(seg.px, seg.py, (r+7)*scale, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.10)`; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(seg.px, seg.py, r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${rc},${gc},${bc},${a})`; ctx.fill();
      if (isLast) {
        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = seg.color; ctx.font = `600 ${10*scale}px -apple-system,sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(seg.lift.label.split(' ').slice(-1)[0], seg.px + r + 4, seg.py + 4);
      }
    }
  });

  ctx.fillStyle = 'rgba(232,232,242,0.4)';
  ctx.font      = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('← older · time · newer →', cx, cv.height - 6);

  document.getElementById('leg3d').innerHTML =
    Object.values(liftData).map(d =>
      `<div class="legend-item"><div class="lline" style="background:${d.color}"></div><span>${d.label}</span></div>`
    ).join('') +
    `<div class="legend-item" style="margin-left:8px;color:rgba(232,232,242,0.3)">drag to rotate</div>`;
}

function setup3dInteraction() {
  const cv = document.getElementById('cv3d');
  cv.onmousedown = e => { drag3d = true; lastMouse = { x: e.clientX, y: e.clientY }; cv.style.cursor = 'grabbing'; };
  cv.onmousemove = e => {
    if (!drag3d) return;
    const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
    angle3dY += dx * 0.008;
    angle3dX += dy * 0.008;
    lastMouse = { x: e.clientX, y: e.clientY };
    draw3D();
  };
  cv.onmouseup = cv.onmouseleave = () => { drag3d = false; cv.style.cursor = 'grab'; };
  cv.style.cursor = 'grab';
}

// ─────────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────────

function switchTab(idx) {
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab'  ).forEach((t,i) => t.classList.toggle('active', i===idx));
  closeTrail();
  if (idx === 0) drawPortfolio();
  if (idx === 1) drawAllLifts();
  if (idx === 2) { draw3D(); setup3dInteraction(); }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────

drawPortfolio();
window.addEventListener('resize', () => {
  if (document.getElementById('panel0').classList.contains('active')) drawPortfolio();
  if (document.getElementById('panel1').classList.contains('active')) drawAllLifts();
  if (document.getElementById('panel2').classList.contains('active')) draw3D();
});
</script>
